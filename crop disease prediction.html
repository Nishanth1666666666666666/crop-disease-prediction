<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Crop Disease Predictor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f4f9f4;
    }
    h2 {
      color: #2e7d32;
    }
    form {
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    label {
      font-weight: bold;
    }
    input, textarea, button {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 16px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      background: #2e7d32;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1b5e20;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      color: #d32f2f;
    }
  </style>
</head>
<body>
  <h2>🌱 Crop Disease Prediction</h2>
  <form id="predictionForm">
    <label for="crop">Crop Name:</label>
    <input type="text" id="crop" name="crop" required>

    <label for="symptoms">Symptoms:</label>
    <textarea id="symptoms" name="symptoms" rows="4" required></textarea>

    <button type="submit">Predict Disease</button>
  </form>

  <div id="result"></div>

  <script>
    const diseases = {
      wheat: ["Rust", "Smut", "Powdery Mildew"],
      rice: ["Blast", "Brown Spot", "Sheath Blight"],
      maize: ["Leaf Blight", "Downy Mildew", "Ear Rot"]
    };

    document.getElementById("predictionForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const crop = document.getElementById("crop").value.toLowerCase();
      const symptoms = document.getElementById("symptoms").value;

      let prediction;
      if (diseases[crop]) {
        const options = diseases[crop];
        prediction = options[Math.floor(Math.random() * options.length)];
      } else {
        prediction = "Unknown disease (no data available)";
      }

      document.getElementById("result").innerText = 
        `Predicted Disease for ${crop}: ${prediction}`;
    });
  </script>
</body>
</html>
